apiVersion: v1
kind: ConfigMap
metadata:
  name: specter-config
  labels:
    app: specter

data:
  config.yaml: |
    specter:
      version: "1.0.0"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: specter-reports-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: specter-scan
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: specter
              image: specter:latest
              args: ["scan", "-t", "192.168.1.0/24", "--config", "/etc/specter/config.yaml"]
              envFrom:
                - secretRef:
                    name: specter-secrets
              volumeMounts:
                - name: reports
                  mountPath: /app/reports
                - name: config
                  mountPath: /etc/specter
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  add: ["NET_RAW", "NET_ADMIN"]
          volumes:
            - name: reports
              persistentVolumeClaim:
                claimName: specter-reports-pvc
            - name: config
              configMap:
                name: specter-config
